version: '3.8'

services:
  backend:
    build: ./backend
    container_name: rossmann_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Sincroniza tus archivos locales con el contenedor

  frontend:
    build: ./frontend
    container_name: rossmann_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000/predict  # El frontend llama al backend por su nombre interno
      - DB_PATH=/backend/rossmann.db         # Ruta a la base de datos dentro del contenedor
    volumes:
      - ./frontend:/app
      - ./backend:/backend  # Le damos acceso de lectura al frontend a la base de datos del backend
    depends_on:
      - backend